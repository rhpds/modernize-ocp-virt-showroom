---
- name: Solve Module 01 — VM Foundations with OpenShift Lightspeed
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    _token: "{{ lookup('file', '/var/run/secrets/kubernetes.io/serviceaccount/token') }}"
    _os_images_ns: openshift-virtualization-os-images

  tasks:
    - name: Read namespace from service account
      ansible.builtin.slurp:
        src: /var/run/secrets/kubernetes.io/serviceaccount/namespace
      register: r_ns

    - name: Set username and namespace facts
      ansible.builtin.set_fact:
        username: "{{ r_ns.content | b64decode | trim | regex_replace('-showroom$', '') }}"
        vms_namespace: "{{ r_ns.content | b64decode | trim | regex_replace('-showroom$', '') }}-vms"

    - name: Check if RHEL9 VM already exists
      ansible.builtin.uri:
        url: "https://kubernetes.default.svc/apis/kubevirt.io/v1/namespaces/{{ vms_namespace }}/virtualmachines/{{ username }}-rhel9"
        method: GET
        headers:
          Authorization: "Bearer {{ _token }}"
        validate_certs: false
        status_code: [200, 404]
      register: r_rhel9_check

    - name: Find RHEL9 boot image PVC in openshift-virtualization-os-images
      ansible.builtin.uri:
        url: "https://kubernetes.default.svc/api/v1/namespaces/{{ _os_images_ns }}/persistentvolumeclaims"
        method: GET
        headers:
          Authorization: "Bearer {{ _token }}"
        validate_certs: false
        status_code: [200]
      register: r_os_pvcs
      when: r_rhel9_check.status == 404

    - name: Set RHEL9 boot image PVC name
      ansible.builtin.set_fact:
        rhel9_pvc_name: >-
          {{
            r_os_pvcs.json['items']
            | map(attribute='metadata.name')
            | select('search', 'rhel9')
            | list | first | default('')
          }}
      when:
        - r_rhel9_check.status == 404
        - r_os_pvcs is defined
        - r_os_pvcs.status | default(0) == 200

    - name: Create RHEL9 VM with DataVolume clone from boot image
      ansible.builtin.uri:
        url: "https://kubernetes.default.svc/apis/kubevirt.io/v1/namespaces/{{ vms_namespace }}/virtualmachines"
        method: POST
        headers:
          Authorization: "Bearer {{ _token }}"
          Content-Type: "application/json"
        body_format: json
        body:
          apiVersion: kubevirt.io/v1
          kind: VirtualMachine
          metadata:
            name: "{{ username }}-rhel9"
            namespace: "{{ vms_namespace }}"
            labels:
              app: "{{ username }}-rhel9"
          spec:
            running: true
            dataVolumeTemplates:
              - metadata:
                  name: "{{ username }}-rhel9"
                spec:
                  storage:
                    accessModes:
                      - ReadWriteMany
                    resources:
                      requests:
                        storage: 30Gi
                  source:
                    pvc:
                      name: "{{ rhel9_pvc_name }}"
                      namespace: "{{ _os_images_ns }}"
            template:
              metadata:
                labels:
                  kubevirt.io/vm: "{{ username }}-rhel9"
              spec:
                domain:
                  cpu:
                    cores: 1
                    sockets: 1
                    threads: 1
                  devices:
                    disks:
                      - name: rootdisk
                        disk:
                          bus: virtio
                      - name: cloudinitdisk
                        disk:
                          bus: virtio
                  resources:
                    requests:
                      memory: 2Gi
                volumes:
                  - name: rootdisk
                    dataVolume:
                      name: "{{ username }}-rhel9"
                  - name: cloudinitdisk
                    cloudInitNoCloud:
                      userData: |
                        #cloud-config
                        user: cloud-user
                        password: redhat
                        chpasswd: {expire: False}
        validate_certs: false
        status_code: [200, 201, 409]
      when:
        - r_rhel9_check.status == 404
        - rhel9_pvc_name is defined
        - rhel9_pvc_name | length > 0

    - name: Check if database-server VM already exists
      ansible.builtin.uri:
        url: "https://kubernetes.default.svc/apis/kubevirt.io/v1/namespaces/{{ vms_namespace }}/virtualmachines/database-server"
        method: GET
        headers:
          Authorization: "Bearer {{ _token }}"
        validate_certs: false
        status_code: [200, 404]
      register: r_db_check

    - name: Create database-server VM
      ansible.builtin.uri:
        url: "https://kubernetes.default.svc/apis/kubevirt.io/v1/namespaces/{{ vms_namespace }}/virtualmachines"
        method: POST
        headers:
          Authorization: "Bearer {{ _token }}"
          Content-Type: "application/json"
        body_format: json
        body:
          apiVersion: kubevirt.io/v1
          kind: VirtualMachine
          metadata:
            name: database-server
            namespace: "{{ vms_namespace }}"
            labels:
              app: database-server
          spec:
            running: true
            template:
              metadata:
                labels:
                  kubevirt.io/vm: database-server
              spec:
                domain:
                  cpu:
                    cores: 1
                  devices:
                    disks:
                      - name: rootdisk
                        disk:
                          bus: virtio
                      - name: cloudinitdisk
                        disk:
                          bus: virtio
                  resources:
                    requests:
                      memory: 2Gi
                volumes:
                  - name: rootdisk
                    containerDisk:
                      image: quay.io/containerdisks/centos-stream:9
                  - name: cloudinitdisk
                    cloudInitNoCloud:
                      userData: |
                        #cloud-config
                        user: dbadmin
                        password: dbpassword
                        chpasswd: {expire: False}
                        packages:
                          - mariadb-server
                        runcmd:
                          - systemctl enable mariadb
                          - systemctl start mariadb
        validate_certs: false
        status_code: [200, 201, 409]
      when: r_db_check.status == 404

    - name: Show completion message
      ansible.builtin.copy:
        content: |
          [INFO]
          [OK] Module 01 solved

          Created:
          - VM {{ username }}-rhel9 in {{ vms_namespace }}
          - VM database-server in {{ vms_namespace }}

          Wait 2-3 minutes for VMs to reach Running state, then click Validate.
        dest: "{{ job_info_dir }}/validation_failure.out"
        mode: '0644'
      delegate_to: localhost
      when: job_info_dir is defined
