---
- name: Validate Module 01 — VM Foundations with OpenShift Lightspeed
  hosts: localhost
  connection: local
  gather_facts: false

  tasks:
    - name: Read namespace from service account
      ansible.builtin.slurp:
        src: /var/run/secrets/kubernetes.io/serviceaccount/namespace
      register: r_ns

    - name: Set username and namespace facts
      ansible.builtin.set_fact:
        username: "{{ r_ns.content | b64decode | trim | regex_replace('-showroom$', '') }}"
        vms_namespace: "{{ r_ns.content | b64decode | trim | regex_replace('-showroom$', '') }}-vms"

    - name: Get RHEL9 VM
      kubernetes.core.k8s_info:
        kubeconfig: "{{ k8s_kubeconfig }}"
        api_version: kubevirt.io/v1
        kind: VirtualMachine
        name: "{{ username }}-rhel9"
        namespace: "{{ vms_namespace }}"
      register: r_rhel9_vm

    - name: Get database-server VM
      kubernetes.core.k8s_info:
        kubeconfig: "{{ k8s_kubeconfig }}"
        api_version: kubevirt.io/v1
        kind: VirtualMachine
        name: database-server
        namespace: "{{ vms_namespace }}"
      register: r_db_vm

    - name: Evaluate checks
      ansible.builtin.set_fact:
        rhel9_vm_running: >-
          {{
            r_rhel9_vm.resources | length > 0 and
            r_rhel9_vm.resources[0].status.printableStatus | default('') == 'Running'
          }}
        db_vm_running: >-
          {{
            r_db_vm.resources | length > 0 and
            r_db_vm.resources[0].status.printableStatus | default('') == 'Running'
          }}

    - name: Validate all tasks
      validation_check:
        check: "{{ rhel9_vm_running and db_vm_running }}"
        pass_msg: |
          [OK] VM {{ username }}-rhel9 is Running in {{ vms_namespace }}
          [OK] VM database-server is Running in {{ vms_namespace }}
        error_msg: |
          {{ '[OK]' if rhel9_vm_running else '[FAIL]' }} VM {{ username }}-rhel9 is Running
          {{ '[OK]' if db_vm_running else '[FAIL]' }} VM database-server is Running
