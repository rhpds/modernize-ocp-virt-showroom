---
- name: Validate Module 03 — Declarative management and automation with DevHub and GitOps
  hosts: localhost
  connection: local
  gather_facts: false

  tasks:
    - name: Read namespace from service account
      ansible.builtin.slurp:
        src: /var/run/secrets/kubernetes.io/serviceaccount/namespace
      register: r_ns

    - name: Set username and namespace facts
      ansible.builtin.set_fact:
        username: "{{ r_ns.content | b64decode | trim | regex_replace('-showroom$', '') }}"
        travel_control_new_ns: >-
          {{ r_ns.content | b64decode | trim | regex_replace('-showroom$', '') }}-travel-control-new

    - name: Get control-vm VirtualMachine
      kubernetes.core.k8s_info:
        kubeconfig: "{{ k8s_kubeconfig }}"
        api_version: kubevirt.io/v1
        kind: VirtualMachine
        name: control-vm
        namespace: "{{ travel_control_new_ns }}"
      register: r_control_vm

    - name: Evaluate checks
      ansible.builtin.set_fact:
        control_vm_running: >-
          {{
            r_control_vm.resources | length > 0 and
            r_control_vm.resources[0].status.printableStatus | default('') == 'Running'
          }}

    - name: Validate all tasks
      validation_check:
        check: "{{ control_vm_running }}"
        pass_msg: |
          ✅ VirtualMachine control-vm is Running in {{ travel_control_new_ns }}
        error_msg: |
          {{ '✅' if control_vm_running else '❌' }} VirtualMachine control-vm is Running in {{ travel_control_new_ns }}
