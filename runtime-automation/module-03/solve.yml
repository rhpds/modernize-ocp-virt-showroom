---
- name: Solve Module 03 — Declarative management and automation with DevHub and GitOps
  hosts: localhost
  connection: local
  gather_facts: false

  tasks:
    - name: Read namespace from service account
      ansible.builtin.slurp:
        src: /var/run/secrets/kubernetes.io/serviceaccount/namespace
      register: r_ns

    - name: Set username and namespace facts
      ansible.builtin.set_fact:
        username: "{{ r_ns.content | b64decode | trim | regex_replace('-showroom$', '') }}"
        travel_control_new_ns: >-
          {{ r_ns.content | b64decode | trim | regex_replace('-showroom$', '') }}-travel-control-new

    - name: Check if control-vm already exists
      kubernetes.core.k8s_info:
        kubeconfig: "{{ k8s_kubeconfig }}"
        api_version: kubevirt.io/v1
        kind: VirtualMachine
        name: control-vm
        namespace: "{{ travel_control_new_ns }}"
      register: r_control_vm_check

    - name: Create control-vm VirtualMachine directly
      kubernetes.core.k8s:
        kubeconfig: "{{ k8s_kubeconfig }}"
        state: present
        definition:
          apiVersion: kubevirt.io/v1
          kind: VirtualMachine
          metadata:
            name: control-vm
            namespace: "{{ travel_control_new_ns }}"
          spec:
            dataVolumeTemplates:
              - apiVersion: cdi.kubevirt.io/v1beta1
                kind: DataVolume
                metadata:
                  name: fedora-control
                spec:
                  sourceRef:
                    kind: DataSource
                    name: fedora
                    namespace: openshift-virtualization-os-images
                  storage:
                    resources:
                      requests:
                        storage: 30Gi
            running: true
            template:
              metadata:
                annotations:
                  istio.io/reroute-virtual-interfaces: k6t-eth0
                  vm.kubevirt.io/flavor: small
                  vm.kubevirt.io/os: fedora
                  vm.kubevirt.io/workload: server
                labels:
                  app: control-vm
                  kubevirt.io/domain: control-vm
                  kubevirt.io/size: small
                  version: v1
              spec:
                domain:
                  cpu:
                    cores: 1
                    sockets: 1
                    threads: 1
                  devices:
                    disks:
                      - disk:
                          bus: virtio
                        name: rootdisk
                      - disk:
                          bus: virtio
                        name: cloudinitdisk
                    interfaces:
                      - masquerade: {}
                        name: default
                    rng: {}
                  features:
                    acpi: {}
                    smm:
                      enabled: true
                  firmware:
                    bootloader:
                      efi: {}
                  machine:
                    type: pc-q35-rhel9.4.0
                  memory:
                    guest: 1Gi
                networks:
                  - name: default
                    pod: {}
                terminationGracePeriodSeconds: 180
                volumes:
                  - dataVolume:
                      name: fedora-control
                    name: rootdisk
                  - cloudInitNoCloud:
                      userData: |
                        #cloud-config
                        user: fedora
                        password: redhat
                        chpasswd: { expire: False }
                        ssh_pwauth: true
                        runcmd:
                        - loginctl enable-linger fedora
                        - su - fedora -c 'XDG_RUNTIME_DIR=/run/user/$(id -u) DBUS_SESSION_BUS_ADDRESS="unix:path=${XDG_RUNTIME_DIR}/bus" systemctl --user daemon-reload'
                        - su - fedora -c 'XDG_RUNTIME_DIR=/run/user/$(id -u) DBUS_SESSION_BUS_ADDRESS="unix:path=${XDG_RUNTIME_DIR}/bus" systemctl --user start control.service'
                        write_files:
                        - content: |
                            [Unit]
                            Description=Fedora Control Container
                            [Container]
                            Label=app=control-container
                            ContainerName=control-container
                            Image=quay.io/kiali/demo_travels_control:v1
                            Environment=PORTAL_SERVICES='voyages.fr;http://voyages.{{ username }}-travel-portal.svc.cluster.local:8000,viaggi.it;http://viaggi.{{ username }}-travel-portal.svc.cluster.local:8000,travels.uk;http://travels.{{ username }}-travel-portal.svc.cluster.local:8000'
                            PodmanArgs=-p 8080:8080
                            [Install]
                            WantedBy=multi-user.target default.target
                            [Service]
                            Restart=always
                          path: /etc/containers/systemd/users/control.container
                          permissions: '0777'
                          owner: root:root
                    name: cloudinitdisk
      when: r_control_vm_check.resources | length == 0

    - name: Wait for control-vm to reach Running state
      kubernetes.core.k8s_info:
        kubeconfig: "{{ k8s_kubeconfig }}"
        api_version: kubevirt.io/v1
        kind: VirtualMachine
        name: control-vm
        namespace: "{{ travel_control_new_ns }}"
      register: r_wait_vm
      until: >-
        r_wait_vm.resources | length > 0 and
        r_wait_vm.resources[0].status.printableStatus | default('') == 'Running'
      retries: 20
      delay: 15

    - name: Show completion message
      ansible.builtin.copy:
        content: |
          [INFO]
          [OK] Module 03 solved

          Created:
          - VirtualMachine control-vm in {{ travel_control_new_ns }}

          Click Validate to confirm.
        dest: "{{ job_info_dir }}/validation_failure.out"
        mode: '0644'
      delegate_to: localhost
      when: job_info_dir is defined
