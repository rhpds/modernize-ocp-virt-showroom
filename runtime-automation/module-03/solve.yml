---
- name: Solve Module 03 — Declarative management and automation with DevHub and GitOps
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    _repo_url: https://github.com/rhpds/modernize-ocp-virt-showroom.git
    _repo_path: module-03/travel-control

  tasks:
    - name: Read namespace from service account
      ansible.builtin.slurp:
        src: /var/run/secrets/kubernetes.io/serviceaccount/namespace
      register: r_ns

    - name: Set username and namespace facts
      ansible.builtin.set_fact:
        username: "{{ r_ns.content | b64decode | trim | regex_replace('-showroom$', '') }}"
        travel_control_new_ns: >-
          {{ r_ns.content | b64decode | trim | regex_replace('-showroom$', '') }}-travel-control-new

    - name: Check if control-vm already exists
      kubernetes.core.k8s_info:
        api_version: kubevirt.io/v1
        kind: VirtualMachine
        name: control-vm
        namespace: "{{ travel_control_new_ns }}"
      register: r_control_vm_check

    - name: Get Argo CD Application for travel-control
      kubernetes.core.k8s_info:
        api_version: argoproj.io/v1alpha1
        kind: Application
        name: travel-control
        namespace: "{{ travel_control_new_ns }}"
      register: r_argo_app
      when: r_control_vm_check.resources | length == 0

    - name: Get cluster ingress domain
      kubernetes.core.k8s_info:
        api_version: config.openshift.io/v1
        kind: Ingress
        name: cluster
      register: r_ingress
      when: r_control_vm_check.resources | length == 0

    - name: Set apps domain fact
      ansible.builtin.set_fact:
        apps_domain: "{{ r_ingress.resources[0].spec.domain }}"
      when:
        - r_control_vm_check.resources | length == 0
        - r_ingress.resources | length > 0

    - name: Create Argo CD Application for travel-control
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: argoproj.io/v1alpha1
          kind: Application
          metadata:
            name: travel-control
            namespace: "{{ travel_control_new_ns }}"
          spec:
            project: default
            source:
              repoURL: "{{ _repo_url }}"
              targetRevision: HEAD
              path: "{{ _repo_path }}"
              helm:
                parameters:
                  - name: username
                    value: "{{ username }}"
                  - name: ossm_ingress
                    value: "{{ username }}-ingress-istio-gateway.{{ apps_domain }}"
            destination:
              server: https://kubernetes.default.svc
            syncPolicy:
              automated:
                prune: true
                selfHeal: true
              syncOptions:
                - CreateNamespace=true
      when:
        - r_control_vm_check.resources | length == 0
        - r_argo_app.resources | length == 0
        - apps_domain is defined

    - name: Wait for control-vm to reach Running state
      kubernetes.core.k8s_info:
        api_version: kubevirt.io/v1
        kind: VirtualMachine
        name: control-vm
        namespace: "{{ travel_control_new_ns }}"
      register: r_wait_vm
      until: >-
        r_wait_vm.resources | length > 0 and
        r_wait_vm.resources[0].status.printableStatus | default('') == 'Running'
      retries: 20
      delay: 15
      when: r_control_vm_check.resources | length == 0

    - name: Show completion message
      ansible.builtin.copy:
        content: |
          [INFO]
          [OK] Module 03 solved

          Created:
          - Argo CD Application travel-control (auto-sync + self-heal enabled)
          - VirtualMachine control-vm in {{ travel_control_new_ns }}

          Click Validate to confirm.
        dest: "{{ job_info_dir }}/validation_failure.out"
        mode: '0644'
      delegate_to: localhost
      when: job_info_dir is defined
