---
- name: Solve Module 02 — Service Mesh integration with virtual machines
  hosts: localhost
  connection: local
  gather_facts: false

  tasks:
    - name: Read namespace from service account
      ansible.builtin.slurp:
        src: /var/run/secrets/kubernetes.io/serviceaccount/namespace
      register: r_ns

    - name: Set username and namespace facts
      ansible.builtin.set_fact:
        username: "{{ r_ns.content | b64decode | trim | regex_replace('-showroom$', '') }}"
        travel_agency_ns: "{{ r_ns.content | b64decode | trim | regex_replace('-showroom$', '') }}-travel-agency"
        travel_control_ns: "{{ r_ns.content | b64decode | trim | regex_replace('-showroom$', '') }}-travel-control"

    - name: DEBUG — show kubeconfig path and slurp it
      ansible.builtin.slurp:
        src: "{{ k8s_kubeconfig }}"
      register: r_kc_debug

    - name: DEBUG — print kubeconfig path and API server
      ansible.builtin.debug:
        msg:
          - "k8s_kubeconfig path: {{ k8s_kubeconfig }}"
          - "API server: {{ (r_kc_debug.content | b64decode | from_yaml).clusters[0].cluster.server }}"

    - name: Check if cars-vm-v2 already exists
      kubernetes.core.k8s_info:
        kubeconfig: "{{ k8s_kubeconfig }}"
        api_version: kubevirt.io/v1
        kind: VirtualMachine
        name: cars-vm-v2
        namespace: "{{ travel_agency_ns }}"
      register: r_cars_v2_check

    - name: Get cars-vm spec to use as base for v2
      kubernetes.core.k8s_info:
        kubeconfig: "{{ k8s_kubeconfig }}"
        api_version: kubevirt.io/v1
        kind: VirtualMachine
        name: cars-vm
        namespace: "{{ travel_agency_ns }}"
      register: r_cars_vm
      when: r_cars_v2_check.resources | length == 0

    - name: Build cars-vm-v2 manifest from cars-vm spec
      ansible.builtin.set_fact:
        cars_v2_manifest:
          apiVersion: kubevirt.io/v1
          kind: VirtualMachine
          metadata:
            name: cars-vm-v2
            namespace: "{{ travel_agency_ns }}"
            labels: "{{ r_cars_vm.resources[0].metadata.labels | default({}) | combine({'version': 'v2'}) }}"
          spec: >-
            {{
              r_cars_vm.resources[0].spec | combine({
                'template': r_cars_vm.resources[0].spec.template | combine({
                  'spec': r_cars_vm.resources[0].spec.template.spec | combine({
                    'domain': r_cars_vm.resources[0].spec.template.spec.domain | combine({
                      'devices': r_cars_vm.resources[0].spec.template.spec.domain.devices | combine({
                        'interfaces': r_cars_vm.resources[0].spec.template.spec.domain.devices.interfaces
                          | map('dict2items')
                          | map('rejectattr', 'key', 'equalto', 'macAddress')
                          | map('items2dict')
                          | list
                      })
                    })
                  })
                })
              })
            }}
      when:
        - r_cars_v2_check.resources | length == 0
        - r_cars_vm.resources | length > 0

    - name: Create cars-vm-v2 VirtualMachine
      kubernetes.core.k8s:
        kubeconfig: "{{ k8s_kubeconfig }}"
        state: present
        definition: "{{ cars_v2_manifest }}"
      when:
        - r_cars_v2_check.resources | length == 0
        - cars_v2_manifest is defined

    - name: Check if HTTPRoute already exists
      kubernetes.core.k8s_info:
        kubeconfig: "{{ k8s_kubeconfig }}"
        api_version: gateway.networking.k8s.io/v1
        kind: HTTPRoute
        name: control-vm-httproute
        namespace: "{{ travel_control_ns }}"
      register: r_httproute_check

    - name: Get routes in showroom namespace to derive apps domain
      kubernetes.core.k8s_info:
        kubeconfig: "{{ k8s_kubeconfig }}"
        api_version: route.openshift.io/v1
        kind: Route
        namespace: "{{ r_ns.content | b64decode | trim }}"
      register: r_routes
      when: r_httproute_check.resources | length == 0

    - name: Set apps domain from showroom route
      ansible.builtin.set_fact:
        apps_domain: "{{ r_routes.resources[0].spec.host.split('.', 1)[1] }}"
      when:
        - r_httproute_check.resources | length == 0
        - r_routes.resources | length > 0

    - name: Create HTTPRoute for control-vm
      kubernetes.core.k8s:
        kubeconfig: "{{ k8s_kubeconfig }}"
        state: present
        definition:
          apiVersion: gateway.networking.k8s.io/v1
          kind: HTTPRoute
          metadata:
            name: control-vm-httproute
            namespace: "{{ travel_control_ns }}"
          spec:
            parentRefs:
              - name: gateway-shared
                namespace: istio-gateway
            hostnames:
              - "{{ username }}-istio-gateway.{{ apps_domain }}"
            rules:
              - matches:
                  - path:
                      type: PathPrefix
                      value: /
                backendRefs:
                  - name: control-vm
                    port: 8080
      when:
        - r_httproute_check.resources | length == 0
        - apps_domain is defined

    - name: Show completion message
      ansible.builtin.copy:
        content: |
          [INFO]
          [OK] Module 02 solved

          Created:
          - VirtualMachine cars-vm-v2 in {{ travel_agency_ns }}
          - HTTPRoute control-vm-httproute in {{ travel_control_ns }}

          Click Validate to confirm.
        dest: "{{ job_info_dir }}/validation_failure.out"
        mode: '0644'
      delegate_to: localhost
      when: job_info_dir is defined
