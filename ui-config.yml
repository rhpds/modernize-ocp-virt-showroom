---
type: showroom

# Set the left column width to 50%
default_width: 50
# Persist the URL state so browser refresh doesn't reset the UI
persist_url_state: true

# Enable the view switcher so learners can toggle split and full-screen modes
view_switcher:
  enabled: true
  default_mode: split

tabs:
  - name: Terminal
    path: /terminal
    port: 443
  - name: OCP Console
    url: 'https://console-openshift-console.${DOMAIN}'
  - name: Developer Hub
    url: 'https://backstage-developer-hub-rhdh.${DOMAIN}'
  - name: ArgoCD
    url: 'https://argocd-server-${USER}-travel-control-new.${DOMAIN}'

antora:
  name: modules
  dir: www
  modules:
    - name: module-01
      label: "Module 01: VM Foundations with OpenShift Lightspeed"
      solveButton: true
      scripts:
        - solve
        - validation

    - name: module-02
      label: "Module 02: Service Mesh integration with virtual machines"
      solveButton: true
      scripts:
        - solve
        - validation

    - name: module-03
      label: "Module 03: Declarative management and automation with DevHub and GitOps"
      solveButton: true
      scripts:
        - solve
        - validation
